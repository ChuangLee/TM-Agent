name: Bug report
description: Something is broken or not behaving as documented.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before filing, please
        check that no existing issue covers it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what is wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. Include URLs, sample input, and
        anything needed to reproduce on a fresh checkout.
      placeholder: |
        1. Run `npm install`
        2. `npm run dev`
        3. Open `http://localhost:5173/`
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, screenshots, or console output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TM-Agent version / commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device class
      options:
        - Phone (touch)
        - Tablet (touch)
        - Desktop (mouse + keyboard)
        - Other / mixed
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: "Safari 17.4 on iOS 17 / Chrome 124 on macOS 14 / ..."
    validations:
      required: true
  - type: input
    id: tmux
    attributes:
      label: tmux version on the host
      placeholder: "tmux 3.4"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, ADR references, related issues, anything else.
