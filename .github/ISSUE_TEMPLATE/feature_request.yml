name: Feature request
description: Suggest a capability or UX improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please first read [`docs/DESIGN_PRINCIPLES.md`](../../docs/DESIGN_PRINCIPLES.md)
        and check [`docs/ROADMAP.md`](../../docs/ROADMAP.md) — your idea may
        already be on the roadmap or out of scope by design.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or missing capability are you describing?
        Concrete scenarios are more useful than abstract requests.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you address it? Sketches, mocks, or rough flows
        are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Surface
      options:
        - Mobile UI
        - Desktop UI
        - Backend / protocol
        - Deployment / install
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
