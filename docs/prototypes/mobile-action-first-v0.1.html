<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>TM-Agent · 移动动作优先原型 v0.1</title>
<style>
  :root {
    --bg: #0c0e12;
    --bg-elev: #14171d;
    --bg-elev-hi: #1c2029;
    --bg-overlay: rgba(12, 14, 18, 0.78);
    --line: #232832;
    --ink: #e7ecf3;
    --ink-dim: #8891a0;
    --accent: #7dd3fc;
    --accent-on: #0c0e12;
    --warn: #fbbf24;
    --err: #f87171;
    --ok: #4ade80;
    --ui-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono-font: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100dvh; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ui-font);
    font-size: 14px;
    line-height: 20px;
    overflow: hidden;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .app {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    height: 100dvh;
  }

  /* Top bar */
  .topbar {
    height: 48px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .topbar .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
    flex: none;
  }
  .topbar .name {
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .sub {
    color: var(--ink-dim);
    margin-left: 8px;
  }
  .topbar .badge {
    color: var(--warn);
    background: rgba(251, 191, 36, 0.12);
    padding: 2px 6px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .topbar .menu-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 0; color: var(--ink);
    font-size: 18px;
  }

  /* State switcher (debug only, not in real product) */
  .switcher {
    padding: 8px 12px;
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev);
    font-size: 12px;
  }
  .switcher b { color: var(--ink-dim); font-weight: 500; margin-right: 4px; align-self: center; }
  .switcher button {
    background: var(--bg-elev-hi);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
  }
  .switcher button.active {
    background: var(--accent);
    color: var(--accent-on);
    border-color: var(--accent);
  }

  /* Terminal surface */
  .surface {
    overflow: auto;
    padding: 8px 12px;
    font-family: var(--mono-font);
    font-size: 14px;
    line-height: 18px;
    color: var(--ink);
    white-space: pre;
    min-height: 40vh;
  }
  .surface .dim { color: var(--ink-dim); }
  .surface .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s infinite step-end;
  }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* Prompt banner (replaces action panel in confirm/password state) */
  .banner {
    border-top: 1px solid var(--line);
    padding: 12px 16px;
    background: var(--bg-elev);
    display: none;
  }
  .app.state-confirm_prompt .banner.confirm { display: block; }
  .app.state-password_prompt .banner.password { display: block; }
  .app.state-confirm_prompt .action-panel,
  .app.state-password_prompt .action-panel { display: none; }

  .banner h4 {
    margin: 0 0 8px; font-size: 13px; color: var(--ink-dim);
    font-weight: 500; display: flex; align-items: center; gap: 8px;
  }
  .banner .close {
    margin-left: auto; background: transparent; border: 0;
    color: var(--ink-dim); font-size: 16px; padding: 0 4px;
  }
  .banner .btn-row { display: flex; gap: 12px; margin-bottom: 8px; }
  .banner .btn-row button {
    flex: 1; min-height: 48px; border-radius: 8px; font-size: 15px;
    font-weight: 600; border: 1px solid transparent;
  }
  .banner .btn-yes {
    background: var(--accent); color: var(--accent-on);
  }
  .banner .btn-no {
    background: transparent; color: var(--ink); border-color: var(--line);
  }
  .banner .hint { color: var(--ink-dim); font-size: 12px; }
  .banner .pw-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .banner .pw-row input {
    flex: 1; height: 48px; padding: 0 12px; font-size: 16px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
  }
  .banner .pw-actions { display: flex; gap: 8px; }
  .banner .pw-actions button {
    min-height: 40px; padding: 0 14px; border-radius: 6px;
    background: var(--bg-elev-hi); color: var(--ink);
    border: 1px solid var(--line); font-size: 13px;
  }
  .banner .pw-actions .send {
    background: var(--accent); color: var(--accent-on); border-color: var(--accent);
    flex: 1;
  }

  /* Action panel: horizontal card strip */
  .action-panel {
    border-top: 1px solid var(--line);
    padding: 8px 12px;
    background: var(--bg);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .action-panel::-webkit-scrollbar { display: none; }
  .action-panel .rows {
    display: grid; grid-auto-flow: column;
    grid-template-rows: 44px 44px;
    grid-auto-columns: max-content;
    gap: 8px;
  }
  .app.state-long_process .action-panel .rows {
    grid-template-rows: auto;
  }
  .card {
    background: var(--bg-elev);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0 16px;
    min-width: 64px;
    height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono-font);
    font-size: 14px;
    white-space: nowrap;
    transition: transform 60ms, background 60ms;
  }
  .card:active { transform: scale(0.96); background: var(--bg-elev-hi); }
  .card.special { font-family: var(--ui-font); }
  .card.big {
    grid-row: 1 / span 2;
    min-height: 80px;
    padding: 0 24px;
    color: var(--err);
    border-color: var(--err);
    background: rgba(248, 113, 113, 0.08);
    font-size: 15px;
    font-weight: 600;
    flex-direction: column;
  }
  .card.big small {
    color: var(--ink-dim);
    font-size: 12px;
    font-weight: 400;
    margin-top: 4px;
  }
  .card.accent {
    background: var(--accent);
    color: var(--accent-on);
    border-color: var(--accent);
  }

  /* Action rail (bottom fixed row) */
  .action-rail {
    height: 52px;
    padding: 6px 12px;
    display: flex; align-items: center;
    gap: 8px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .action-rail .left { display: flex; gap: 6px; align-items: center; }
  .action-rail .right { margin-left: auto; display: flex; gap: 8px; }
  .action-rail .arrow {
    width: 40px; height: 40px; border-radius: 6px;
    background: var(--bg-elev); color: var(--ink);
    border: 1px solid var(--line);
    display: none; align-items: center; justify-content: center;
    font-family: var(--mono-font);
  }
  .app.state-editor .action-rail .arrow,
  .app.state-tui .action-rail .arrow,
  .app.state-pager .action-rail .arrow { display: flex; }
  .action-rail .chip {
    height: 40px; padding: 0 14px; border-radius: 6px;
    background: var(--bg-elev); color: var(--ink);
    border: 1px solid var(--line);
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .action-rail .kbd-btn,
  .action-rail .compose-btn {
    width: 48px; height: 48px; border-radius: 10px;
    background: var(--bg-elev); color: var(--ink);
    border: 1px solid var(--line);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .action-rail .compose-btn { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }

  /* Key overlay */
  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 32vh;
    background: var(--bg-overlay);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 1000;
    padding: 12px 16px 20px;
    display: none;
    flex-direction: column;
    gap: 10px;
    transform: translateY(-100%);
    transition: transform 180ms ease, opacity 180ms ease;
    opacity: 0;
  }
  .overlay.open { display: flex; transform: translateY(0); opacity: 1; }
  .overlay .handle {
    align-self: center;
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--ink-dim);
    opacity: 0.5;
    margin-bottom: 4px;
  }
  .overlay .zone-title {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    margin: 4px 0 2px;
  }
  .overlay .keys {
    display: grid; grid-auto-flow: column;
    grid-template-rows: repeat(1, 1fr);
    grid-auto-columns: 1fr;
    gap: 8px;
  }
  .overlay .keys.wide { grid-auto-columns: max-content; }
  .overlay .key {
    background: rgba(34, 38, 46, 0.95);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-family: var(--mono-font);
    font-size: 14px;
    min-height: 44px;
    padding: 0 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .overlay .key.big { min-height: 52px; font-size: 16px; font-weight: 600; }
  .overlay .key.mod.armed { border-color: var(--warn); border-width: 2px; }
  .overlay .key.mod.locked { background: var(--warn); color: var(--accent-on); border-color: var(--warn); font-weight: 700; }
  .overlay .arrows {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px;
    justify-items: center;
    max-width: 240px;
    margin: 4px auto;
  }
  .overlay .arrows .key { width: 48px; height: 44px; padding: 0; }
  .overlay .arrows .k-up { grid-column: 2; grid-row: 1; }
  .overlay .arrows .k-left { grid-column: 1; grid-row: 2; }
  .overlay .arrows .k-down { grid-column: 2; grid-row: 2; }
  .overlay .arrows .k-right { grid-column: 3; grid-row: 2; }
  .overlay .bottom-row { display: flex; gap: 8px; margin-top: auto; align-items: center; }
  .overlay .bottom-row .fn-toggle {
    background: rgba(34, 38, 46, 0.95);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0 14px; min-height: 44px;
  }
  .overlay .bottom-row .compose-link {
    margin-left: auto;
    background: var(--accent);
    color: var(--accent-on);
    border: 0; border-radius: 10px;
    padding: 0 16px; min-height: 44px;
    font-weight: 600;
  }
  .overlay .fkeys {
    display: none;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: 36px 36px;
    gap: 6px;
  }
  .overlay.fn-open .fkeys { display: grid; }
  .overlay .fkeys .key { font-size: 12px; min-height: 36px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--bg-elev-hi); color: var(--ink);
    border: 1px solid var(--line);
    padding: 10px 16px; border-radius: 8px;
    font-size: 13px;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms;
    z-index: 2000;
  }
  .toast.show { opacity: 1; }
  @media (prefers-reduced-motion: reduce) {
    .overlay { transition: opacity 0.01ms; }
    .card { transition: none; }
  }

  /* >=820px: fall back to a notice; this prototype is mobile-only */
  @media (min-width: 820px) {
    .app { max-width: 420px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
    body { background: #050608; }
  }
</style>
</head>
<body>
<div class="app state-shell_idle" id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="dot" title="已连接"></div>
    <div class="name">main<span class="sub" id="topbar-sub">· zsh</span></div>
    <span class="badge" id="topbar-badge" style="display:none">?</span>
    <button class="menu-btn" aria-label="菜单">⌃</button>
  </div>

  <!-- State switcher (prototype-only tool) -->
  <div class="switcher">
    <b>原型测试 · 切换状态:</b>
    <button data-state="shell_idle" class="active">shell_idle</button>
    <button data-state="long_process">long_process</button>
    <button data-state="editor">editor</button>
    <button data-state="tui">tui</button>
    <button data-state="repl">repl</button>
    <button data-state="pager">pager</button>
    <button data-state="confirm_prompt">confirm</button>
    <button data-state="password_prompt">password</button>
  </div>

  <!-- Simulated terminal -->
  <div class="surface" id="surface">
$ ls
README.md  package.json  src/  docs/
$ cd src/frontend
$ git status
On branch main
nothing to commit, working tree clean
$ <span class="cursor"></span>
  </div>

  <!-- Prompt banners (conditional) -->
  <div class="banner confirm" role="alert">
    <h4>脚本在等待: <span class="mono">[Y/n]</span>
      <button class="close" aria-label="关闭提示">×</button>
    </h4>
    <div class="btn-row">
      <button class="btn-yes" data-send="y\r">是<br/><small style="opacity:0.7;font-weight:400">y</small></button>
      <button class="btn-no" data-send="n\r">否<br/><small style="opacity:0.7;font-weight:400">n</small></button>
    </div>
    <div class="hint">默认: 是 (按 Enter)</div>
  </div>
  <div class="banner password" role="alert">
    <h4>请输入密码</h4>
    <div class="pw-row">
      <input type="password" placeholder="••••••••" autocomplete="off" spellcheck="false" />
    </div>
    <div class="pw-actions">
      <button class="pw-show" aria-label="显示密码">👁 显示</button>
      <button class="pw-cancel">取消</button>
      <button class="send">发送 →</button>
    </div>
    <div class="hint">提示: [sudo] password for user:</div>
  </div>

  <!-- Action panel -->
  <div class="action-panel">
    <div class="rows" id="cards"></div>
  </div>

  <!-- Action rail -->
  <div class="action-rail">
    <div class="left">
      <button class="arrow" data-send="\x1b[A">↑</button>
      <button class="arrow" data-send="\x1b[B">↓</button>
      <button class="arrow" data-send="\x1b[D">←</button>
      <button class="arrow" data-send="\x1b[C">→</button>
      <button class="chip" id="rail-hist">↑ 历史</button>
      <button class="chip" id="rail-tab">Tab</button>
    </div>
    <div class="right">
      <button class="kbd-btn" id="kbd-btn" aria-label="打开按键层">⌨</button>
      <button class="compose-btn" aria-label="打开输入">✎</button>
    </div>
  </div>
</div>

<!-- Key overlay -->
<div class="overlay" id="overlay">
  <div class="handle"></div>

  <div class="zone-title">状态相关 · <span id="overlay-state">shell_idle</span></div>
  <div class="keys" id="overlay-state-keys"></div>

  <div class="zone-title">修饰键</div>
  <div class="keys">
    <button class="key mod" data-mod="ctrl">Ctrl</button>
    <button class="key mod" data-mod="alt">Alt</button>
    <button class="key mod" data-mod="shift">Shift</button>
    <button class="key mod" data-mod="meta">⌘</button>
  </div>

  <div class="zone-title">方向键</div>
  <div class="arrows">
    <button class="key k-up" data-send="\x1b[A">↑</button>
    <button class="key k-left" data-send="\x1b[D">←</button>
    <button class="key k-down" data-send="\x1b[B">↓</button>
    <button class="key k-right" data-send="\x1b[C">→</button>
  </div>

  <div class="zone-title">高频键</div>
  <div class="keys">
    <button class="key big" data-send="\x1b">Esc</button>
    <button class="key big" data-send="\t">Tab</button>
    <button class="key big" data-send="\r">Enter</button>
    <button class="key big" data-send="\x7f">⌫</button>
  </div>
  <div class="keys">
    <button class="key" data-send="|">|</button>
    <button class="key" data-send="~">~</button>
    <button class="key" data-send="/">/</button>
    <button class="key" data-send="\\">\</button>
  </div>

  <div class="fkeys">
    <button class="key">F1</button><button class="key">F2</button><button class="key">F3</button>
    <button class="key">F4</button><button class="key">F5</button><button class="key">F6</button>
    <button class="key">F7</button><button class="key">F8</button><button class="key">F9</button>
    <button class="key">F10</button><button class="key">F11</button><button class="key">F12</button>
  </div>

  <div class="bottom-row">
    <button class="fn-toggle" id="fn-toggle">Fn</button>
    <button class="compose-link" id="to-compose">✎ 文字输入</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // -----------------------------------------------------------
  // State definitions (mirrors docs/design/0006-...-product-spec.md §3.3)
  // -----------------------------------------------------------
  const STATES = {
    shell_idle: {
      label: "zsh",
      surfaceHtml: [
        "$ ls",
        "README.md  package.json  src/  docs/",
        "$ cd src/frontend",
        "$ git status",
        "On branch main",
        "nothing to commit, working tree clean",
        '$ <span class="cursor"></span>'
      ].join("\n"),
      cards: [
        { label: "↑ 历史", payload: "__HISTORY__", special: true },
        { label: "Tab", payload: "\t", special: true },
        { label: "ls", payload: "ls\r" },
        { label: "clear", payload: "clear\r" },
        { label: "git st", payload: "git status\r" },
        { label: "git diff", payload: "git diff\r" },
        { label: "npm run dev", payload: "npm run dev\r" },
        { label: "cd ..", payload: "cd ..\r" }
      ]
    },
    long_process: {
      label: "npm",
      surfaceHtml: [
        "$ npm run dev",
        "vite v7.1.9",
        "ready in 124 ms",
        "",
        '<span class="dim">➜ Local:   http://localhost:5173/</span>',
        '<span class="dim">➜ press h to show help</span>',
        '<span class="cursor"></span>'
      ].join("\n"),
      cards: "long_process_big"
    },
    editor: {
      label: "vim notes.md",
      surfaceHtml: [
        "# Notes",
        "",
        "- buy milk<span class=\"cursor\"></span>",
        "- walk dog",
        "- call mom",
        "",
        "~",
        "~",
        "~",
        '<span class="dim">"notes.md" 5L, 42C               3,8</span>'
      ].join("\n"),
      cards: [
        { label: "Esc", payload: "\x1b", special: true },
        { label: ":w", payload: ":w\r" },
        { label: ":q", payload: ":q\r" },
        { label: ":wq", payload: ":wq\r" },
        { label: "i", payload: "i" },
        { label: "/", payload: "/" },
        { label: "gg", payload: "gg" },
        { label: "G", payload: "G" },
        { label: "dd", payload: "dd" },
        { label: "yy", payload: "yy" },
        { label: "p", payload: "p" },
        { label: "u", payload: "u" }
      ]
    },
    tui: {
      label: "claude",
      surfaceHtml: [
        '<span class="dim">┌─ Claude ────────────────────────┐</span>',
        '<span class="dim">│</span>                                <span class="dim">│</span>',
        '<span class="dim">│</span>  > tell me a joke              <span class="dim">│</span>',
        '<span class="dim">│</span>                                <span class="dim">│</span>',
        '<span class="dim">│</span>  Here\'s one: Why don\'t sci-   <span class="dim">│</span>',
        '<span class="dim">│</span>  entists trust atoms?          <span class="dim">│</span>',
        '<span class="dim">│</span>  Because they make up          <span class="dim">│</span>',
        '<span class="dim">│</span>  everything. <span class="cursor"></span>         <span class="dim">│</span>',
        '<span class="dim">│</span>                                <span class="dim">│</span>',
        '<span class="dim">│</span>  [Type message…]                <span class="dim">│</span>',
        '<span class="dim">└─────────────────────────────────┘</span>'
      ].join("\n"),
      cards: [
        { label: "Esc", payload: "\x1b", special: true },
        { label: "y", payload: "y" },
        { label: "n", payload: "n" },
        { label: "/", payload: "/" },
        { label: "?", payload: "?" },
        { label: "Enter", payload: "\r", special: true },
        { label: "Ctrl+C", payload: "\x03", special: true },
        { label: "q", payload: "q" }
      ]
    },
    repl: {
      label: "node",
      surfaceHtml: [
        "Welcome to Node.js v20.10.0.",
        "Type \".help\" for more information.",
        "> const x = 10",
        "undefined",
        "> x * 2",
        "20",
        '> <span class="cursor"></span>'
      ].join("\n"),
      cards: [
        { label: "↑ 历史", payload: "__HISTORY__", special: true },
        { label: "Tab", payload: "\t", special: true },
        { label: ".exit", payload: ".exit\r" },
        { label: ".help", payload: ".help\r" },
        { label: ".clear", payload: ".clear\r" },
        { label: "const", payload: "const " },
        { label: "let", payload: "let " },
        { label: "function", payload: "function " }
      ]
    },
    pager: {
      label: "less",
      surfaceHtml: [
        "NAME",
        "       ls - list directory contents",
        "",
        "SYNOPSIS",
        "       ls [OPTION]... [FILE]...",
        "",
        "DESCRIPTION",
        "       List information about the",
        "       FILEs (the current directory",
        "       by default). ...",
        ':<span class="cursor"></span>'
      ].join("\n"),
      cards: [
        { label: "Space", payload: " ", special: true },
        { label: "b", payload: "b" },
        { label: "/", payload: "/" },
        { label: "n", payload: "n" },
        { label: "q", payload: "q" },
        { label: "G", payload: "G" },
        { label: "gg", payload: "gg" },
        { label: "?", payload: "?" }
      ]
    },
    confirm_prompt: {
      label: "apt",
      surfaceHtml: [
        "The following will be installed:",
        "  libfoo libbar libbaz",
        "After this operation, 42 MB used.",
        'Do you want to continue? [Y/n] <span class="cursor"></span>'
      ].join("\n"),
      cards: []
    },
    password_prompt: {
      label: "sudo",
      surfaceHtml: [
        "$ sudo systemctl restart nginx",
        '[sudo] password for user: <span class="cursor"></span>'
      ].join("\n"),
      cards: []
    }
  };

  // -----------------------------------------------------------
  // Wiring
  // -----------------------------------------------------------
  const app = document.getElementById("app");
  const surface = document.getElementById("surface");
  const cards = document.getElementById("cards");
  const topbarSub = document.getElementById("topbar-sub");
  const topbarBadge = document.getElementById("topbar-badge");
  const overlay = document.getElementById("overlay");
  const overlayState = document.getElementById("overlay-state");
  const overlayStateKeys = document.getElementById("overlay-state-keys");
  const toastEl = document.getElementById("toast");

  function setState(name) {
    const s = STATES[name];
    if (!s) return;
    Object.keys(STATES).forEach((k) => app.classList.remove("state-" + k));
    app.classList.add("state-" + name);
    topbarSub.textContent = "· " + s.label;
    topbarBadge.style.display = "none"; // not wired in prototype
    surface.innerHTML = s.surfaceHtml;

    // Render cards
    cards.innerHTML = "";
    if (s.cards === "long_process_big") {
      const big = document.createElement("div");
      big.className = "card big";
      big.innerHTML = "⏹ Ctrl + C<small>停止当前进程</small>";
      big.addEventListener("click", () => send("\x03"));
      cards.appendChild(big);
      // secondary: detected shortcuts (mock)
      [["h", "h"], ["q", "q"]].forEach(([label, payload]) => {
        const c = document.createElement("button");
        c.className = "card";
        c.textContent = label;
        c.addEventListener("click", () => send(payload));
        cards.appendChild(c);
      });
    } else {
      (s.cards || []).forEach((c) => {
        const el = document.createElement("button");
        el.className = "card" + (c.special ? " special" : "");
        el.textContent = c.label;
        el.addEventListener("click", () => {
          if (c.payload === "__HISTORY__") toast("(原型) 打开历史选择器");
          else send(c.payload);
        });
        // long-press hint
        let timer;
        el.addEventListener("pointerdown", () => {
          timer = setTimeout(() => toast('(原型) 长按 → 填入 compose: "' + c.label + '"'), 500);
        });
        el.addEventListener("pointerup", () => clearTimeout(timer));
        el.addEventListener("pointercancel", () => clearTimeout(timer));
        el.addEventListener("pointerleave", () => clearTimeout(timer));
        cards.appendChild(el);
      });
    }

    // Render overlay state-keys band
    overlayState.textContent = name;
    overlayStateKeys.innerHTML = "";
    const sample = (s.cards === "long_process_big" ? [] : (s.cards || [])).slice(0, 6);
    sample.forEach((c) => {
      const k = document.createElement("button");
      k.className = "key";
      k.textContent = c.label;
      k.addEventListener("click", () => { send(c.payload); });
      overlayStateKeys.appendChild(k);
    });
  }

  function send(payload) {
    const preview = payload.replace(/\r/g, "\\r").replace(/\t/g, "\\t").replace(/\x1b/g, "\\x1b").replace(/\x03/g, "\\x03").replace(/\x7f/g, "\\x7f");
    toast('(原型) 发送: "' + preview + '"');
    if (navigator.vibrate) try { navigator.vibrate(10); } catch (e) {}
  }

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
  }

  // State switcher
  document.querySelectorAll(".switcher button").forEach((b) => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".switcher button").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      setState(b.dataset.state);
    });
  });

  // Overlay open/close
  document.getElementById("kbd-btn").addEventListener("click", () => {
    overlay.classList.add("open");
  });
  document.getElementById("to-compose").addEventListener("click", () => {
    overlay.classList.remove("open");
    toast("(原型) 打开 compose 输入");
  });

  // Swipe-up to close on overlay
  let overlayStartY = null;
  overlay.addEventListener("pointerdown", (e) => { overlayStartY = e.clientY; });
  overlay.addEventListener("pointerup", (e) => {
    if (overlayStartY !== null && overlayStartY - e.clientY > 60) {
      overlay.classList.remove("open");
    }
    overlayStartY = null;
  });

  // Top-edge pull-down to open
  let topPullY = null;
  document.addEventListener("pointerdown", (e) => {
    if (e.clientY < 20) topPullY = e.clientY;
  });
  document.addEventListener("pointerup", (e) => {
    if (topPullY !== null && e.clientY - topPullY > 60) {
      overlay.classList.add("open");
    }
    topPullY = null;
  });

  // Sticky modifier keys
  document.querySelectorAll(".key.mod").forEach((m) => {
    let pressTimer = null;
    m.addEventListener("pointerdown", () => {
      pressTimer = setTimeout(() => {
        m.classList.remove("armed");
        m.classList.toggle("locked");
        pressTimer = null;
      }, 500);
    });
    m.addEventListener("pointerup", () => {
      if (pressTimer !== null) {
        clearTimeout(pressTimer);
        pressTimer = null;
        if (m.classList.contains("locked")) {
          m.classList.remove("locked");
        } else {
          m.classList.toggle("armed");
        }
      }
    });
  });

  // Fn toggle
  document.getElementById("fn-toggle").addEventListener("click", () => {
    overlay.classList.toggle("fn-open");
  });

  // Generic data-send binder
  document.querySelectorAll("[data-send]").forEach((el) => {
    if (el.closest(".banner")) return; // banners handled separately
    el.addEventListener("click", () => {
      const raw = el.dataset.send
        .replace(/\\r/g, "\r")
        .replace(/\\t/g, "\t")
        .replace(/\\x1b/g, "\x1b")
        .replace(/\\x03/g, "\x03")
        .replace(/\\x7f/g, "\x7f")
        .replace(/\\\\/g, "\\");
      send(raw);
      // release armed modifiers
      document.querySelectorAll(".key.mod.armed").forEach((m) => m.classList.remove("armed"));
    });
  });

  // Banner: confirm
  document.querySelectorAll(".banner.confirm button[data-send]").forEach((b) => {
    b.addEventListener("click", () => {
      const raw = b.dataset.send.replace(/\\r/g, "\r");
      send(raw);
    });
  });
  document.querySelector(".banner.confirm .close").addEventListener("click", () => {
    setState("shell_idle");
    document.querySelector('.switcher button[data-state="shell_idle"]').click();
  });

  // Banner: password
  const pwInput = document.querySelector(".banner.password input");
  const pwShow = document.querySelector(".pw-show");
  pwShow.addEventListener("click", () => {
    const showing = pwInput.type === "text";
    pwInput.type = showing ? "password" : "text";
    pwShow.innerHTML = showing ? "👁 显示" : "🙈 隐藏";
  });
  document.querySelector(".banner.password .pw-cancel").addEventListener("click", () => {
    send("\x03");
    pwInput.value = "";
  });
  document.querySelector(".banner.password .send").addEventListener("click", () => {
    const v = pwInput.value;
    toast("(原型) 已发送密码 " + "*".repeat(Math.min(v.length, 12)) + " + \\r");
    pwInput.value = "";
    if (navigator.vibrate) try { navigator.vibrate(10); } catch (e) {}
  });

  // init
  setState("shell_idle");
</script>
</body>
</html>
