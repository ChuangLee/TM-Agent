<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0d1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>TM-Agent · prototype</title>
<style>
  :root {
    --bg: #0a0f1b;
    --bg-elev: #111827;
    --bg-raised: #1a2235;
    --line: #1f2937;
    --line-strong: #334155;
    --ink: #d1e4ff;
    --ink-dim: #93a4bb;
    --ink-mute: #64748b;
    --accent: #7cc0ff;
    --accent-2: #a78bfa;
    --ok: #60d394;
    --warn: #fbbf24;
    --err: #f87171;
    --mono: 'Menlo', 'SF Mono', 'Fira Code', 'MesloLGS NF', Consolas, monospace;
    --sans: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --topbar-h: 48px;
    --compose-h: auto;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
  body {
    background: radial-gradient(circle at 80% -10%, #1a2340, #0a0f1b 55%);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    touch-action: manipulation;
  }
  button, input, textarea { font: inherit; color: inherit; }
  button { background: none; border: 0; padding: 0; cursor: pointer; }

  #app {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    grid-template-columns: 1fr;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
    max-width: 100%;
  }
  /* ─────────────── TopBar ─────────────── */
  .topbar {
    display: grid;
    grid-template-columns: 40px 40px 1fr 40px 40px 40px;
    align-items: center;
    height: var(--topbar-h);
    padding: 0 4px;
    background: rgba(10,15,27,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    position: relative;
    gap: 0;
  }
  .topbar .icon-btn {
    width: 40px; height: 40px;
    display: grid; place-items: center;
    color: var(--ink-dim);
    border-radius: 10px;
    font-size: 18px;
  }
  .topbar .icon-btn:hover { color: var(--ink); background: var(--bg-raised); }
  .topbar .icon-btn:active { background: var(--line-strong); }
  .topbar .icon-btn.on { color: var(--accent); background: var(--bg-raised); }
  .topbar .title-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    line-height: 1.1;
    touch-action: pan-x;
    cursor: grab;
    min-width: 0;
    padding: 0 4px;
  }
  .topbar .title-wrap:active { cursor: grabbing; }
  .topbar .session-name {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .topbar .window-strip {
    margin-top: 3px;
    display: flex; gap: 4px;
  }
  .topbar .window-dot {
    width: 14px; height: 3px;
    border-radius: 2px;
    background: var(--line-strong);
    transition: background 0.2s, width 0.2s;
  }
  .topbar .window-dot.active { background: var(--accent); width: 18px; }

  /* ─────────────── Terminal surface ─────────────── */
  .surface {
    position: relative;
    overflow: hidden;
    background: var(--bg);
    touch-action: none;
  }
  .layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .layer.history {
    z-index: 1;
    transform: translateY(-100%);
    background: #0c1220;
    display: flex; flex-direction: column;
  }
  .layer.live {
    z-index: 2;
    will-change: transform;
    background: var(--bg);
    transition: transform 0.25s cubic-bezier(.32,.72,0,1);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.3);
  }
  .layer.live.dragging { transition: none; }
  body.history-open .layer.live { transform: translateY(100%); }
  body.history-open .layer.history { transform: none; }
  body.history-open .layer.history { transition: transform 0.25s cubic-bezier(.32,.72,0,1); }

  /* Live (fake xterm) */
  .term-view {
    padding: 10px 12px 18px;
    font-family: var(--mono);
    font-size: clamp(12px, 3.3vw, 14px);
    line-height: 1.45;
    color: var(--ink);
    height: 100%;
    overflow: hidden;
    white-space: pre;
    display: flex; flex-direction: column; gap: 0;
  }
  .term-view .line { white-space: pre; }
  .term-view .prompt { color: var(--accent); }
  .term-view .user { color: var(--ink); }
  .term-view .claude { color: var(--accent-2); }
  .term-view .ok { color: var(--ok); }
  .term-view .warn { color: var(--warn); }
  .term-view .dim { color: var(--ink-dim); }
  .term-view .tool { color: #f5a97f; }
  .term-view .path { color: #89dceb; }
  .term-view .cursor {
    display: inline-block; width: 0.55em; height: 1em;
    background: var(--accent); vertical-align: text-top;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .pull-hint {
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--ink-mute);
    padding: 4px 10px;
    background: rgba(17,24,39,0.7);
    border: 1px solid var(--line);
    border-radius: 999px;
    backdrop-filter: blur(6px);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 3;
  }
  .pull-hint.visible { opacity: 1; }

  /* Pane dots */
  .pane-dots {
    position: absolute; left: 0; right: 0; bottom: 6px;
    display: flex; justify-content: center; gap: 6px;
    z-index: 3; pointer-events: none;
  }
  .pane-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--line-strong);
    transition: all 0.2s;
  }
  .pane-dot.active { background: var(--accent); width: 20px; border-radius: 4px; }

  /* History layer */
  .history-head {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    background: rgba(10,15,27,0.85);
    backdrop-filter: blur(10px);
  }
  .history-head button {
    color: var(--accent);
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 8px;
  }
  .history-head button:hover { background: var(--bg-raised); }
  .history-head button:active { background: var(--line-strong); }
  .history-title { font-size: 13px; color: var(--ink-dim); flex: 1; }
  .history-scroll {
    flex: 1; overflow: auto; overscroll-behavior: contain;
    padding: 12px 14px 32px;
    font-family: var(--mono);
    font-size: clamp(12px, 3vw, 13.5px);
    line-height: 1.5;
    color: var(--ink);
    white-space: pre;
    user-select: text;
    -webkit-user-select: text;
    touch-action: pan-y;
    cursor: text;
  }
  .history-scroll::selection { background: rgba(124,192,255,0.35); }

  /* ─────────────── SmartKeys (collapsible) ─────────────── */
  .smartkeys-wrap {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.25s cubic-bezier(.32,.72,0,1);
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
  }
  .smartkeys-wrap.open { max-height: 54px; }
  .smartkeys {
    display: flex; gap: 6px;
    padding: 7px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    touch-action: pan-x;
  }
  .smartkeys::-webkit-scrollbar { display: none; }
  .smartkey {
    flex: 0 0 auto;
    padding: 7px 12px;
    border-radius: 9px;
    background: var(--bg-raised);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 500;
    border: 1px solid var(--line-strong);
    min-width: 40px;
    transition: transform 0.08s;
  }
  .smartkey:hover { background: var(--line-strong); }
  .smartkey.sticky.on {
    background: var(--accent);
    color: #0a0f1b;
    border-color: var(--accent);
  }
  .smartkey:active { transform: scale(0.94); }

  /* ─────────────── Compose ─────────────── */
  .compose {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding: 8px 10px 10px;
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    align-items: end;
  }
  .compose textarea {
    width: 100%;
    min-height: 40px;
    max-height: 160px;
    padding: 9px 12px;
    border-radius: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.35;
    resize: none;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
    touch-action: pan-y;
  }
  .compose textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,192,255,0.12); }
  .compose textarea::placeholder { color: var(--ink-mute); }
  .compose .send {
    height: 40px;
    padding: 0 16px;
    border-radius: 10px;
    background: var(--accent);
    color: #0a0f1b;
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
  }
  .compose .send:hover { background: #93cdff; }
  .compose .send:active { background: #5faae8; }
  .compose .send:disabled { background: var(--line-strong); color: var(--ink-mute); cursor: not-allowed; }

  /* ─────────────── Drawers & sheets ─────────────── */
  .scrim {
    position: absolute; inset: 0;
    background: rgba(5,8,14,0.6);
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 40;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: min(86%, 340px);
    background: var(--bg-elev);
    border-right: 1px solid var(--line);
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(.32,.72,0,1);
    z-index: 41;
    display: flex; flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }
  .drawer.open { transform: none; }
  .drawer-head {
    padding: 14px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-head h2 { margin: 0; font-size: 17px; font-weight: 600; }
  .drawer-head .add {
    background: var(--accent);
    color: #0a0f1b;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 20px; line-height: 1;
    display: grid; place-items: center; font-weight: 600;
  }
  .sess-list {
    flex: 1; overflow-y: auto;
    padding: 0 10px 20px;
  }
  .sess-card {
    position: relative;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
    touch-action: pan-y;
  }
  .sess-card:hover { border-color: var(--line-strong); }
  .sess-card.active { border-color: var(--accent); background: #14203a; }
  .sess-card .row1 {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px; gap: 8px;
  }
  .sess-card .name {
    font-family: var(--mono); font-weight: 600; font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sess-card .meta { font-size: 11px; color: var(--ink-mute); flex-shrink: 0; }
  .sess-card .preview {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .sess-card .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok); margin-right: 6px; vertical-align: middle;
  }
  .sess-card .status-dot.idle { background: var(--ink-mute); }

  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--bg-elev);
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    border-top: 1px solid var(--line);
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(.32,.72,0,1);
    z-index: 41;
    padding-bottom: var(--safe-bot);
  }
  .sheet.open { transform: none; }
  .sheet .grabber {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--line-strong);
    margin: 8px auto 4px;
  }
  .sheet h3 {
    margin: 4px 0 12px; font-size: 13px; font-weight: 500;
    color: var(--ink-dim); text-align: center;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
    gap: 8px;
    padding: 0 12px 20px;
  }
  .cmd-tile {
    aspect-ratio: 1.1;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    color: var(--ink);
    font-size: 11px;
    padding: 6px;
    transition: transform 0.08s, background 0.15s;
  }
  .cmd-tile .glyph { font-size: 22px; color: var(--accent); }
  .cmd-tile:hover { background: var(--line-strong); }
  .cmd-tile:active { transform: scale(0.96); }
  .cmd-tile.danger .glyph { color: var(--err); }
  .cmd-tile .kbd {
    position: absolute;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink-mute);
    padding: 1px 4px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--line);
    margin-top: -54px; margin-left: 54px;
  }

  /* toast */
  .toast {
    position: absolute;
    left: 50%; bottom: calc(80px + var(--safe-bot));
    transform: translate(-50%, 60px);
    background: rgba(17,24,39,0.95);
    color: var(--ink);
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    font-size: 13px;
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    max-width: 85%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* prototype banner */
  .banner {
    position: absolute; top: calc(var(--safe-top) + 52px); right: 10px;
    z-index: 70;
    font-size: 10px;
    color: var(--ink-mute);
    padding: 3px 8px;
    background: rgba(10,15,27,0.8);
    border: 1px solid var(--line);
    border-radius: 999px;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }

  /* keyboard hint for desktop */
  .kbd-hints {
    position: absolute; bottom: 12px; left: 12px;
    z-index: 70;
    font-size: 10px;
    color: var(--ink-mute);
    background: rgba(10,15,27,0.7);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 8px;
    line-height: 1.6;
    backdrop-filter: blur(6px);
    display: none;
  }
  @media (hover: hover) and (pointer: fine) {
    .kbd-hints { display: block; }
  }
  .kbd-hints kbd {
    font-family: var(--mono);
    font-size: 9.5px;
    background: var(--bg-raised);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--ink-dim);
  }

  /* cursor fallback for hover-capable devices */
  @media (hover: hover) and (pointer: fine) {
    .sess-card { cursor: pointer; }
    .cmd-tile { cursor: pointer; }
    .smartkey { cursor: pointer; }
  }

  /* ─────────────── Desktop / tablet-landscape (must stay LAST so overrides win) ─────────────── */
  @media (min-width: 820px) {
    #app {
      grid-template-columns: minmax(240px, 300px) 1fr;
      grid-template-rows: auto 1fr auto auto;
      grid-template-areas:
        "sidebar topbar"
        "sidebar surface"
        "sidebar smartkeys"
        "sidebar compose";
      max-width: none;
    }
    .topbar         { grid-area: topbar; }
    .surface        { grid-area: surface; }
    .smartkeys-wrap { grid-area: smartkeys; }
    .compose        { grid-area: compose; }

    .drawer {
      position: static;
      grid-area: sidebar;
      width: auto;
      transform: none !important;
      border-right: 1px solid var(--line);
      border-top: 0;
      z-index: 1;
      padding-top: 0;
      padding-bottom: 0;
    }
    .scrim { display: none !important; }
    #btn-sessions { display: none; }

    .sheet { left: 300px; }
    .banner { right: 10px; top: calc(var(--safe-top) + 52px); }
    .kbd-hints { right: 12px; left: auto; bottom: 72px; }
  }
  @media (min-width: 1280px) {
    body { font-size: 16px; }
    #app { grid-template-columns: 320px 1fr; }
    .sheet { left: 320px; }
  }
  @media (min-width: 1600px) {
    #app { grid-template-columns: 360px 1fr; }
    .sheet { left: 360px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- TopBar -->
  <div class="topbar">
    <button class="icon-btn" id="btn-sessions" title="Sessions" aria-label="sessions">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button class="icon-btn" id="btn-history" title="History" aria-label="history">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </button>
    <div class="title-wrap" id="title-wrap">
      <div class="session-name" id="session-name">main</div>
      <div class="window-strip" id="window-strip"></div>
    </div>
    <button class="icon-btn" id="btn-keys" title="Smart keys" aria-label="smart keys">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M7 14h10"/></svg>
    </button>
    <button class="icon-btn" id="btn-cmd" title="Commands" aria-label="commands">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3a3 3 0 0 1 3 3v3H9a3 3 0 1 1 0-6z"/><path d="M15 21a3 3 0 0 1-3-3v-3h3a3 3 0 1 1 0 6z"/><path d="M21 9a3 3 0 0 1-3 3h-3V9a3 3 0 1 1 6 0z"/><path d="M3 15a3 3 0 0 1 3-3h3v3a3 3 0 1 1-6 0z"/></svg>
    </button>
    <button class="icon-btn" id="btn-more" title="More" aria-label="more">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
    </button>
  </div>

  <!-- Surface: live + history layers -->
  <div class="surface" id="surface">
    <div class="pull-hint" id="pull-hint">下拉查看历史 · 可选中复制</div>

    <div class="layer history" id="layer-history">
      <div class="history-head">
        <button id="btn-history-back">← Live</button>
        <div class="history-title" id="history-title">scrollback</div>
        <button id="btn-history-copy">复制</button>
      </div>
      <div class="history-scroll" id="history-scroll"></div>
    </div>

    <div class="layer live" id="layer-live">
      <div class="term-view" id="term-view"></div>
      <div class="pane-dots" id="pane-dots"></div>
    </div>
  </div>

  <!-- SmartKeys (collapsible) -->
  <div class="smartkeys-wrap" id="smartkeys-wrap">
    <div class="smartkeys" id="smartkeys"></div>
  </div>

  <!-- Compose -->
  <div class="compose">
    <textarea id="compose-input" rows="1" placeholder="在此输入，发送到当前 pane…"></textarea>
    <button class="send" id="btn-send">Send ↵</button>
  </div>

  <!-- Overlays live inside #app so they inherit the desktop viewport frame -->
  <div class="scrim" id="scrim-drawer"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <h2>Sessions</h2>
      <button class="add" id="btn-new-session" title="new session">+</button>
    </div>
    <div class="sess-list" id="sess-list"></div>
  </div>

  <div class="scrim" id="scrim-sheet"></div>
  <div class="sheet" id="sheet">
    <div class="grabber"></div>
    <h3>tmux 命令</h3>
    <div class="cmd-grid" id="cmd-grid"></div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="banner">prototype · v0.4</div>
  <div class="kbd-hints">
    <div><kbd>Enter</kbd> 发送　<kbd>Shift+Enter</kbd> 换行</div>

  // ────────── Pointer gesture helpers ──────────
  // Unified pointer-event dragger
  function makeDrag(el, opts) {
    let active = false, sx = 0, sy = 0, axis = null, id = null;
    el.addEventListener('pointerdown', (e) => {
      if (opts.ignore && opts.ignore(e)) return;
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      active = true; id = e.pointerId;
      sx = e.clientX; sy = e.clientY; axis = null;
      opts.onStart && opts.onStart(e);
    });
    el.addEventListener('pointermove', (e) => {
      if (!active || e.pointerId !== id) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if (!axis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
        axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        if (opts.onAxis && opts.onAxis(axis, e) === false) { active = false; return; }
        try { el.setPointerCapture(id); } catch {}
      }
      opts.onMove && opts.onMove({ dx, dy, axis, e });
    });
    const finish = (e) => {
      if (!active || (id !== null && e.pointerId !== id)) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      opts.onEnd && opts.onEnd({ dx, dy, axis, cancelled: e.type === 'pointercancel' });
      active = false; axis = null; id = null;
    };
    el.addEventListener('pointerup', finish);
    el.addEventListener('pointercancel', finish);
  }

  // ────────── TopBar: swipe title = switch window; long-press title = drawer ──────────
  (function topbarGestures() {
    const titleEl = $('title-wrap');
    let longTimer = null, moved = false;
    makeDrag(titleEl, {
      onStart: () => {
        moved = false;
        longTimer = setTimeout(() => { if (!moved) openDrawer(); }, 550);
      },
      onMove: ({ dx, dy }) => {
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) { moved = true; clearTimeout(longTimer); }
      },
      onEnd: ({ dx, axis }) => {
        clearTimeout(longTimer);
        if (axis !== 'x') return;
        const s = sess();
        if (dx > 40 && currentWindow > 0) { currentWindow--; renderTopBar(); renderTerm(); toast(`win ${currentWindow+1}/${s.windows}`); }
        else if (dx < -40 && currentWindow < s.windows - 1) { currentWindow++; renderTopBar(); renderTerm(); toast(`win ${currentWindow+1}/${s.windows}`); }
      }
    });
    // desktop: click title = open drawer (same as hamburger, for discoverability)
    titleEl.addEventListener('click', (e) => {
      // prevent click if a drag just finished (rough)
    });
  })();

  // ────────── Surface: pull-down = history; horizontal = switch pane ──────────
  (function surfaceGestures() {
    const surface = $('surface');
    const live = $('layer-live');
    const hint = $('pull-hint');
    let y = 0;
    const H = () => surface.getBoundingClientRect().height;

    makeDrag(surface, {
      ignore: () => document.body.classList.contains('history-open'),
      onStart: () => { y = 0; },
      onAxis: (axis) => true,
      onMove: ({ dx, dy, axis }) => {
        if (axis === 'y' && dy > 0) {
          y = Math.min(dy, H());
          live.classList.add('dragging');
          live.style.transform = `translateY(${y}px)`;
          hint.classList.toggle('visible', y > 30);
        }
      },
      onEnd: ({ dx, axis, cancelled }) => {
        live.classList.remove('dragging');
        live.style.transform = '';
        hint.classList.remove('visible');
        if (cancelled) { y = 0; return; }
        if (axis === 'y' && y > 90) { openHistory(); }
        else if (axis === 'x' && Math.abs(dx) > 50) {
          if (dx < 0 && currentPane < 1) { currentPane++; renderTerm(); toast(`pane ${currentPane+1}/2`); }
          else if (dx > 0 && currentPane > 0) { currentPane--; renderTerm(); toast(`pane ${currentPane+1}/2`); }
        }
        y = 0;
      }
    });
  })();

  // ────────── Session-card left-swipe = hint kill ──────────
  function attachSessSwipe(card, idx) {
    card._swipeMoved = false;
    makeDrag(card, {
      onStart: () => { card._swipeMoved = false; card.style.transition = 'none'; },
      onMove: ({ dx, axis }) => {
        if (axis === 'x') {
          card._swipeMoved = true;
          if (dx < 0) card.style.transform = `translateX(${Math.max(dx, -80)}px)`;
        }
      },
      onEnd: ({ dx, axis }) => {
        card.style.transition = '';
        card.style.transform = '';
        if (axis === 'x' && dx < -60) {
          toast(`kill-session ${sessions[idx].name}`);
        }
        setTimeout(() => { card._swipeMoved = false; }, 50);
      }
    });
  }

  // ────────── Keyboard shortcuts ──────────
  document.addEventListener('keydown', (e) => {
    const inField = ['TEXTAREA', 'INPUT'].includes(document.activeElement?.tagName);
    const mod = e.ctrlKey || e.metaKey;

    // Esc: close overlays in priority order
    if (e.key === 'Escape') {
      if ($('sheet').classList.contains('open')) { closeSheet(); e.preventDefault(); return; }
      if ($('drawer').classList.contains('open')) { closeDrawer(); e.preventDefault(); return; }
      if (document.body.classList.contains('history-open')) { closeHistory(); e.preventDefault(); return; }
      return;
    }

    if (mod && e.key.toLowerCase() === 'k') { e.preventDefault(); toggleSheet(); return; }
    if (mod && e.key === 'ArrowUp')        { e.preventDefault(); toggleHistory(); return; }
    if (mod && e.key === '/')              { e.preventDefault(); toggleSmartKeys(); return; }
    if (mod && e.key.toLowerCase() === 'b') { e.preventDefault(); toggleDrawer(); return; }

    if (inField) return; // don't hijack typing

    // Window nav via Alt+←/→
    if (e.altKey && e.key === 'ArrowLeft')  {
      if (currentWindow > 0) { currentWindow--; renderTopBar(); renderTerm(); toast(`win ${currentWindow+1}/${sess().windows}`); }
      e.preventDefault(); return;
    }
    if (e.altKey && e.key === 'ArrowRight') {
      if (currentWindow < sess().windows - 1) { currentWindow++; renderTopBar(); renderTerm(); toast(`win ${currentWindow+1}/${sess().windows}`); }
      e.preventDefault(); return;
    }
  });

  // ────────── Boot ──────────
  renderTopBar(); renderTerm(); renderSessList(); renderSmartKeys(); renderCmdGrid();
  setTimeout(() => toast('下拉看历史 · Ctrl+K 命令 · Alt+←/→ 切窗口'), 600);
})();
